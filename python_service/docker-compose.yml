version: '3.8'

services:
  ease-intelligence:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ease-intelligence-layer
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=info
    volumes:
      # Mount for development hot-reload
      - ./app:/app/app:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

